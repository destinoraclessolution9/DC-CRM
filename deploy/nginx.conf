# =============================================================================
# Reference only — production is Vercel's edge CDN; do not use this to serve
# the SPA in production.
#
# This server block mirrors vercel.json (security headers + Cache-Control rules
# + cleanUrls + SPA navigation fallback) for LOCAL PARITY / SELF-HOST only. It
# is NOT wired to any pipeline. When vercel.json changes, update this file too.
#
# NOTE on brotli: `brotli_static on` requires the ngx_brotli module, which the
# stock nginx:1.27-alpine image does NOT include. build.mjs pre-generates `.br`
# siblings (brotli quality 11); brotli_static would serve them directly when the
# client sends `Accept-Encoding: br`. Without the module, gzip is the fallback
# and the `.br` files are simply ignored. The brotli_* lines below are wrapped
# in a comment-safe form so this config loads on a vanilla nginx build — see the
# `# brotli_static on;` lines and uncomment them only on a brotli-enabled nginx.
# =============================================================================

# gzip fallback (always available). brotli_static (commented) preferred when the
# ngx_brotli module is compiled in — it serves the pre-built .br files as-is.
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain text/css text/xml
    application/javascript application/json application/xml
    application/manifest+json image/svg+xml font/woff font/woff2;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed brotli .br files when present (requires ngx_brotli).
    # Uncomment on a brotli-enabled nginx build:
    # brotli_static on;
    # brotli on;
    # brotli_types text/plain text/css application/javascript application/json
    #              application/xml image/svg+xml font/woff font/woff2;

    # -------------------------------------------------------------------------
    # Security headers — mirrors vercel.json header set for source "/(.*)".
    # `always` ensures they apply to error responses (404/offline) too.
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    # CSP copied verbatim from vercel.json.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://unpkg.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.qrserver.com https://api.pwnedpasswords.com https://script.google.com https://script.googleusercontent.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://unpkg.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io; frame-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # -------------------------------------------------------------------------
    # Service worker + bootstrap scripts — MUST revalidate every load so a new
    # deploy reaches clients. Mirrors vercel.json /sw.js, /sw-init.js, /obs-init.js.
    # These come BEFORE the generic *.js immutable rule so they win.
    # -------------------------------------------------------------------------
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }
    location = /sw-init.js {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }
    location = /obs-init.js {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Block sensitive build files — mirrors vercel.json rewrites to /404.html.
    # -------------------------------------------------------------------------
    location = /package.json {
        try_files /404.html =404;
    }
    location = /package-lock.json {
        try_files /404.html =404;
    }

    # -------------------------------------------------------------------------
    # Manifest / robots / sitemap — 1h cache. Mirrors vercel.json.
    # Matched before the generic rules via exact `=` locations.
    # -------------------------------------------------------------------------
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # index.html — never store. Mirrors vercel.json "/(index\.html|)".
    # -------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Hashed JS/CSS bundles + images + fonts — immutable for 1 year.
    # Mirrors vercel.json /(.*\.js), /(.*\.css), and the image/font matcher.
    # Hashed names (foo.<hash>.min.js) make `immutable` safe; non-hashed *.js
    # also get this per vercel.json (sw.js etc. are excluded above).
    # -------------------------------------------------------------------------
    location ~* \.(?:js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # cleanUrls — extensionless routes resolve to their .html file.
    # Mirrors vercel.json cleanUrls:true + the explicit rewrites.
    # -------------------------------------------------------------------------
    location = /privacy {
        try_files /privacy.html =404;
    }
    location = /terms {
        try_files /terms.html =404;
    }
    location = /user-guide {
        try_files /user-guide.html =404;
    }
    location = /guide {
        try_files /user-guide.html =404;
    }

    # -------------------------------------------------------------------------
    # Default: cleanUrls + SPA navigation fallback.
    #   1. exact file ($uri)
    #   2. cleanUrls: extensionless -> $uri.html
    #   3. index.html (SPA shell for client-routed paths)
    # The app's service worker owns the offline experience and will substitute
    # /offline.html when the network is down; nginx serves the live SPA shell
    # (index.html) for any unknown in-app navigation. /offline.html itself stays
    # directly reachable as a static file via rule (1).
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri.html /index.html;
    }

    # Custom error page.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
