<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — 页面未找到 | 悅客匯 CRM</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #f9f9f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            padding: 56px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .icon { font-size: 64px; color: #800020; margin-bottom: 20px; }
        h1 { font-size: 72px; font-weight: 800; color: #800020; line-height: 1; }
        h2 { font-size: 22px; font-weight: 600; margin: 12px 0 8px; }
        p { font-size: 15px; color: #666; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 32px;
            padding: 12px 28px;
            background: #800020;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #9b0028; }
        .btn:focus-visible { outline: 2px solid #800020; outline-offset: 3px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">☸️</div>
        <h1>404</h1>
        <h2>页面未找到</h2>
        <p>您访问的页面不存在或已被移除。<br>请返回 悅客匯 CRM 继续工作。</p>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
