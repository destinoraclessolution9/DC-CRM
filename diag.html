<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>CRM Diagnostics</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; background: #fdf2f4; color: #111; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  .row { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; font-size: 15px; line-height: 1.45; box-shadow: 0 1px 3px rgba(0,0,0,.08); word-break: break-word; }
  .k { color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
  .ok { color: #047857; font-weight: 700; }
  .bad { color: #b91c1c; font-weight: 700; }
  .warn { color: #b45309; font-weight: 700; }
  #status { font-size: 13px; color: #6b7280; margin-bottom: 10px; }
</style>
</head>
<body>
<h1>悅客匯 CRM — Calendar Diagnostics</h1>
<div class="row"><a href="/" style="color:#be123c;font-weight:700;text-decoration:none;">← Back to CRM</a></div>
<div id="status">Running…</div>
<div id="out"></div>
<script src="libs/supabase-js-2.106.2.min.js"></script>
<script src="supabase-init.js"></script>
<script src="data-helpers.js"></script>
<script src="data.js"></script>
<script>
(async () => {
  const out = document.getElementById('out');
  const add = (label, value, cls) => {
    const d = document.createElement('div');
    d.className = 'row';
    d.innerHTML = '<div class="k">' + label + '</div><div class="' + (cls || '') + '">' + value + '</div>';
    out.appendChild(d);
  };
  const mask = (s) => { s = String(s || ''); return s.length > 6 ? s.slice(0, 3) + '…' + s.slice(-2) : s; };
  try {
    add('Page build', '2026-07-16 r17');
    // Which mobile CHUNK build has actually run in this container? (earlier
    // rounds couldn't distinguish old vs new — this removes the ambiguity.)
    try {
      const b = localStorage.getItem('mcal-build');
      add('Calendar code build', b ? b : '(none yet — open Calendar once, then reload this page)',
        b === '2026-07-16-r17-nofetch' ? 'ok' : 'warn');
    } catch (_) { /* best-effort */ }
    // Live main-thread storage-read timing: this is the operation the freeze
    // fix removed from the render path. If this reads slowly HERE, the device's
    // storage layer is the confirmed culprit.
    try {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('mcal-') || k.startsWith('mhome-'));
      let bytes = 0; const t0 = performance.now();
      for (const k of keys) { const v = localStorage.getItem(k); bytes += v ? v.length : 0; }
      const dt = performance.now() - t0;
      add('Storage read timing', keys.length + ' keys / ' + Math.round(bytes / 1024) + ' KB read in ' + dt.toFixed(1) + 'ms',
        dt > 200 ? 'bad' : 'ok');
    } catch (_) { /* best-effort */ }
    // Largest localStorage keys (whole store) — proves the r11 pruner shrank it.
    try {
      const sizes = Object.keys(localStorage)
        .map(k => [k, ((localStorage.getItem(k) || '').length * 2)])
        .sort((a, b) => b[1] - a[1]);
      const totalKB = Math.round(sizes.reduce((s, x) => s + x[1], 0) / 1024);
      add('Total localStorage / top keys',
        totalKB + ' KB total<br>' + sizes.slice(0, 6).map(x => x[0] + ' — ' + Math.round(x[1] / 1024) + ' KB').join('<br>'),
        totalKB > 1500 ? 'bad' : 'ok');
    } catch (_) { /* best-effort */ }
    try {
      const hs = JSON.parse(localStorage.getItem('mcal-hang-stage') || 'null');
      add('Month render last stage', hs ? (hs.s + ' @ ' + new Date(hs.ts).toLocaleTimeString() + (hs.s === 'done' ? '' : ' — DID NOT FINISH (froze after this stage)')) : '(never ran)', hs && hs.s !== 'done' ? 'bad' : 'ok');
    } catch (_) { /* best-effort */ }
    try {
      const rm = JSON.parse(localStorage.getItem('mcal-render-ms') || 'null');
      if (rm) add('Last render duration', rm.ms + ' ms @ ' + new Date(rm.ts).toLocaleTimeString(), rm.ms > 1500 ? 'bad' : (rm.ms > 600 ? 'warn' : 'ok'));
    } catch (_) { /* best-effort */ }
    try {
      const ds = JSON.parse(localStorage.getItem('mcal-daysheet-ms') || 'null');
      if (ds) add('Day-sheet open (JS build)', ds.ms + ' ms @ ' + new Date(ds.ts).toLocaleTimeString() + (ds.ms < 50 ? ' — JS is fast; any remaining delay is the browser blur (dropped on mobile r16)' : ''), ds.ms > 800 ? 'bad' : (ds.ms > 200 ? 'warn' : 'ok'));
    } catch (_) { /* best-effort */ }
    try {
      const le = localStorage.getItem('mcal-last-error');
      if (!le) { add('Last calendar error breadcrumb', '(none recorded)', 'ok'); }
      else {
        // Age-aware: a breadcrumb older than 6h is HISTORICAL (from before the
        // current fix), not a live problem — show it neutral, not alarming red.
        let ageMs = Infinity;
        try { ageMs = Date.now() - new Date(JSON.parse(le).ts).getTime(); } catch (_) {}
        const historical = ageMs > 6 * 60 * 60 * 1000;
        add('Last calendar error breadcrumb', (historical ? '(HISTORICAL — before the current build, not a live issue)\n' : '') + le, historical ? 'warn' : 'bad');
      }
    } catch (_) { /* best-effort */ }
    try {
      const log = JSON.parse(localStorage.getItem('crm_error_log') || '[]');
      add('Recent app errors (' + log.length + ' logged)', log.length
        ? log.slice(0, 5).map(x => (x.ts || '').slice(5, 19) + ' [' + (x.type || '?') + '] ' + String(x.msg || '').slice(0, 160) + (x.src ? ' @' + String(x.src).split('/').pop() + ':' + x.line : '')).join('<br><br>')
        : '(none)', log.length ? 'warn' : 'ok');
    } catch (_) { add('Recent app errors', 'unreadable'); }
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const est = await navigator.storage.estimate();
        add('Storage quota', Math.round((est.usage || 0) / 1024) + ' KB used of ' + Math.round((est.quota || 0) / 1048576) + ' MB');
      }
    } catch (_) { /* estimate unsupported */ }
    // Container introspection — which world is this page running in?
    add('Standalone app mode', (navigator.standalone === true) ? 'YES (home-screen app container)' : 'no (browser tab)', '');
    add('One-shot purge flag', localStorage.getItem('_cache_purge_2026_07_13') ? 'PRESENT — new build has run here' : 'ABSENT — this container has NOT run today\'s build yet', localStorage.getItem('_cache_purge_2026_07_13') ? 'ok' : 'bad');
    try {
      const mk = Object.keys(localStorage).filter(k => k.startsWith('mcal-') || k.startsWith('mhome-'));
      add('Mobile cache keys', mk.length ? mk.map(k => { let n = '?'; try { const v = JSON.parse(localStorage.getItem(k)); n = Array.isArray(v && v.val) ? v.val.length + ' rows' : (typeof (v && v.val) === 'string' ? v.val.length + ' chars' : 'obj'); } catch (_) { n = 'raw'; } return k + ' (' + n + ')'; }).join('<br>') : '(none)');
    } catch (_) { add('Mobile cache keys', 'unreadable'); }
    try {
      const hls = window.AppDataStore && typeof AppDataStore.hasLiveSession === 'function' ? AppDataStore.hasLiveSession() : 'n/a (data layer not loaded on this page)';
      add('hasLiveSession()', String(hls));
    } catch (_) { /* data layer absent on diag page — fine */ }
    // 1. localStorage health + auth blob presence
    let lsWritable = false;
    try { localStorage.setItem('__diag_t', '1'); localStorage.removeItem('__diag_t'); lsWritable = true; } catch (_) {}
    add('localStorage writable', lsWritable ? 'YES' : 'NO — private mode / blocked storage?', lsWritable ? 'ok' : 'bad');
    const rawAuth = (() => { try { return localStorage.getItem(window.SUPABASE_AUTH_STORAGE_KEY || 'fs-crm-auth-v1'); } catch (_) { return null; } })();
    let blobInfo = 'ABSENT';
    let blobExpMs = null;
    if (rawAuth) {
      try {
        const b = JSON.parse(rawAuth);
        const exp = b.expires_at || (b.currentSession && b.currentSession.expires_at);
        blobExpMs = exp ? exp * 1000 : null;
        blobInfo = 'present; token expires ' + (exp ? new Date(exp * 1000).toLocaleString() : 'unknown');
      } catch (_) { blobInfo = 'present but UNPARSEABLE'; }
    }
    add('Stored auth blob (fs-crm-auth-v1)', blobInfo, rawAuth ? (blobExpMs && blobExpMs > Date.now() ? 'ok' : 'warn') : 'bad');

    // 2. Live session per supabase-js
    const { data: sess, error: sessErr } = await window.supabase.auth.getSession();
    const session = sess && sess.session;
    add('supabase-js session', session
      ? 'LIVE as ' + mask(session.user && session.user.email) + ' (uid ' + mask(session.user && session.user.id) + ')'
      : 'NONE' + (sessErr ? ' — ' + (sessErr.message || sessErr) : ''), session ? 'ok' : 'bad');
    if (!session) { document.getElementById('status').textContent = 'Done (no session — log in on this browser first, then reopen this page).'; return; }

    // 3. users profile rows for this auth account (id + level only)
    const su = session.user || {};
    const profQ = await window.supabase.from('users').select('id, role').eq('auth_user_id', su.id);
    if (profQ.error) {
      add('users row by auth link', 'ERROR ' + (profQ.error.code || '') + ': ' + (profQ.error.message || ''), 'bad');
    } else {
      add('users row by auth link', (profQ.data || []).length + ' row(s): ' +
        (profQ.data || []).map(r => 'id ' + mask(r.id) + ' / ' + String(r.role || '').split(' ').slice(0, 2).join(' ')).join(' | '),
        (profQ.data || []).length === 1 ? 'ok' : 'warn');
    }

    // 4. THE calendar query (exact mobile shape): July window, date-range only
    const t0 = Date.now();
    const actQ = await window.supabase.from('activities')
      .select('id, activity_type, activity_date, visibility', { count: 'exact' })
      .gte('activity_date', '2026-06-29')
      .lte('activity_date', '2026-08-03')
      .limit(5);
    if (actQ.error) {
      add('activities July window (RLS as you)', 'ERROR ' + (actQ.error.code || '') + ': ' + (actQ.error.message || ''), 'bad');
    } else {
      add('activities July window (RLS as you)', (actQ.count != null ? actQ.count : (actQ.data || []).length) +
        ' rows visible (' + (Date.now() - t0) + 'ms)', (actQ.count || (actQ.data || []).length) > 0 ? 'ok' : 'bad');
    }

    // 5. Desktop RPC as you (admin=false, ids=null → RPC own visibility logic)
    const meRow = (profQ.data && profQ.data[0]) || null;
    if (meRow) {
      const t1 = Date.now();
      const rpcQ = await window.supabase.rpc('get_calendar_window', {
        p_range_start: '2026-06-29', p_range_end: '2026-08-03',
        p_user_id: meRow.id, p_visible_ids: null, p_is_admin: false,
        p_agent_filter: null, p_type_filter: null,
      });
      if (rpcQ.error) {
        add('get_calendar_window RPC (as you)', 'ERROR ' + (rpcQ.error.code || '') + ': ' + (rpcQ.error.message || ''), 'bad');
      } else {
        add('get_calendar_window RPC (as you)', (rpcQ.data || []).length + ' rows (' + (Date.now() - t1) + 'ms)', (rpcQ.data || []).length > 0 ? 'ok' : 'bad');
      }
    }

    // 6. THE APP'S OWN DATA PATH — exactly what the mobile month view calls.
    // This goes through AppDataStore.queryAdvanced (loaded above), including
    // its hasLiveSession gate, light-select column list, fallback and
    // _degraded marking — reproducing the calendar fetch 1:1 in this container.
    try {
      const t2 = Date.now();
      const qa = await window.AppDataStore.queryAdvanced('activities', {
        gte: { activity_date: '2026-06-29' }, lte: { activity_date: '2026-08-03' },
        sort: 'start_time', sortDir: 'asc', limit: 1000, offset: 0, countMode: null,
      });
      const rows = (qa && qa.data) || [];
      add('queryAdvanced month fetch (app path)',
        rows.length + ' rows, degraded=' + String(!!(qa && qa._degraded)) + ' (' + (Date.now() - t2) + 'ms)',
        rows.length > 0 && !(qa && qa._degraded) ? 'ok' : 'bad');
      if (rows.length > 0) {
        const s = rows[0];
        const dates = new Set(rows.map(r => String(r.activity_date || '').slice(0, 10)).filter(Boolean));
        add('Sample row / date grouping',
          'activity_date=' + JSON.stringify(s.activity_date) + ' → key "' + String(s.activity_date || '').slice(0, 10) + '"; '
          + dates.size + ' distinct dates; fields: ' + Object.keys(s).slice(0, 12).join(','));
      }
      add('hasLiveSession (data layer)', String(window.AppDataStore.hasLiveSession()), window.AppDataStore.hasLiveSession() ? 'ok' : 'bad');
    } catch (qaErr) {
      add('queryAdvanced month fetch (app path)', 'THREW: ' + ((qaErr && qaErr.message) || String(qaErr)), 'bad');
    }
    add('App version marker', (document.querySelector('script[src^="script."]') || {}).src || 'n/a (diag page)');
    document.getElementById('status').textContent = 'Done. Please screenshot this whole page.';
  } catch (e) {
    add('UNEXPECTED', (e && e.message) || String(e), 'bad');
    document.getElementById('status').textContent = 'Done with errors — screenshot please.';
  }
})();
</script>
</body>
</html>
