# CI Gates — runs the correctness gates on every PR + every push to main.
#
# These are the SAME checks the autonomous upgrade loop runs locally before each
# push (node ci/audit.js + node ci/test.mjs); wiring them into GitHub Actions
# makes regressions visible automatically as a red check, so a bad commit is
# caught even if a local pre-push run was skipped.
#
# What it checks (all dependency-free — no `npm ci` needed):
#   1. ci/audit.js   — ghost-call sweep: bare calls to chunk-exported functions
#                      inside the script.js IIFE that would throw ReferenceError
#                      at load (the cross-chunk crash class). Exit 1 on issues.
#   2. ci/test.mjs   — TypeScript (`tsc --noEmit`, fetched via npx) over the typed
#                      surface (types/ + api/) + the data-layer contract suite
#                      (offline-queue classification + snapshot-diff). Exit 1 on fail.
#
# IMPORTANT: this workflow is REPORTING-ONLY. It does NOT gate the Vercel
# deployment (Vercel builds independently on push). A red check here surfaces a
# regression for a human to look at; it never blocks or breaks the live site.
#
# The `gates` job stays fast + install-free (audit + tsc/contract). The
# `regression` job (added for the quality refactor) installs devDeps and runs
# the full gate — build + snapshot-vs-baseline + anti-duplication pattern lint +
# size budgets — so an export drop, god-file re-bloat, or a re-introduced
# duplicate pattern is caught automatically instead of relying on a local run.

name: CI Gates

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'marketing/**'
      - '_*'
  push:
    branches: [main, refactor/quality]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'marketing/**'
      - '_*'

jobs:
  gates:
    name: Audit + TypeScript + Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ghost-call audit (cross-chunk ReferenceError sweep)
        run: node ci/audit.js

      - name: TypeScript + data-layer contract tests
        run: node ci/test.mjs

  regression:
    name: Full regression gate (build + snapshot + lint + size)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run full regression gate
        run: npm run ci
